<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OrimaLang Playground</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #1a1a2e;
      --surface:  #16213e;
      --panel:    #0f3460;
      --accent:   #e94560;
      --accent2:  #533483;
      --text:     #eaeaea;
      --muted:    #8888aa;
      --mono:     'Fira Code', 'Cascadia Code', 'Consolas', monospace;
      --radius:   8px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: var(--surface);
      border-bottom: 2px solid var(--accent);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    header h1 {
      font-size: 1.6rem;
      letter-spacing: 0.05em;
      color: var(--accent);
    }

    header span.tagline {
      color: var(--muted);
      font-size: 0.9rem;
    }

    .workspace {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr auto;
      gap: 0;
      padding: 1.5rem;
      gap: 1rem;
    }

    .pane {
      display: flex;
      flex-direction: column;
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--panel);
      overflow: hidden;
    }

    .pane-header {
      background: var(--panel);
      padding: 0.5rem 1rem;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .pane-header .badge {
      background: var(--accent2);
      color: var(--text);
      border-radius: 4px;
      padding: 0.1rem 0.4rem;
      font-size: 0.7rem;
    }

    textarea#code {
      flex: 1;
      background: #12122a;
      color: #c9d1d9;
      font-family: var(--mono);
      font-size: 0.95rem;
      line-height: 1.6;
      border: none;
      outline: none;
      padding: 1rem;
      resize: none;
      tab-size: 2;
      min-height: 300px;
    }

    textarea#code::placeholder {
      color: var(--muted);
    }

    #output {
      flex: 1;
      background: #0d0d1a;
      color: #b5f5b5;
      font-family: var(--mono);
      font-size: 0.95rem;
      line-height: 1.6;
      padding: 1rem;
      white-space: pre-wrap;
      overflow-y: auto;
      min-height: 300px;
    }

    #output.has-error {
      color: #ff7b7b;
    }

    .toolbar {
      grid-column: 1 / -1;
      display: flex;
      gap: 0.75rem;
      align-items: center;
    }

    button {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 0.55rem 1.4rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }

    button:hover { background: #c73350; }
    button:active { transform: scale(0.97); }

    button.secondary {
      background: var(--accent2);
    }
    button.secondary:hover { background: #3e2667; }

    #status {
      color: var(--muted);
      font-size: 0.85rem;
    }

    .loading-msg {
      color: var(--muted);
      font-style: italic;
    }

    footer {
      text-align: center;
      padding: 0.75rem;
      color: var(--muted);
      font-size: 0.78rem;
      border-top: 1px solid var(--panel);
    }

    @media (max-width: 768px) {
      .workspace {
        grid-template-columns: 1fr;
      }
      .toolbar { grid-column: 1; }
    }
  </style>
</head>
<body>
  <header>
    <h1>OrimaLang</h1>
    <span class="tagline">Plain-English Programming Language · Web Playground</span>
  </header>

  <div class="workspace">
    <div class="toolbar">
      <button id="runBtn">&#9654; Run</button>
      <button class="secondary" id="clearBtn">Clear Output</button>
      <button class="secondary" id="exampleBtn">Load Example</button>
      <span id="status">Loading WASM module…</span>
    </div>

    <div class="pane">
      <div class="pane-header">
        Code
        <span class="badge">OrimaLang</span>
      </div>
      <textarea id="code" spellcheck="false" placeholder="Type your OrimaLang code here…

note This is a comment.
set name to World.
say hello and name and exclamation mark."></textarea>
    </div>

    <div class="pane">
      <div class="pane-header">
        Output
        <span class="badge">stdout</span>
      </div>
      <div id="output"><span class="loading-msg">Waiting for WASM…</span></div>
    </div>
  </div>

  <footer>
    OrimaLang &mdash; a plain-English programming language &mdash; powered by Rust + WebAssembly
  </footer>

  <script src="index.js" type="module"></script>
</body>
</html>
